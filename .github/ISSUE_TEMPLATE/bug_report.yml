name: Bug report
description: Report a reproducible problem in the MCP server, tools, resources, or docs.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve KR Election MCP.

        Please avoid sharing API keys, secret values, or full credential screenshots in this form.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the behavior you expected.
      placeholder: The tool returned unauthorized even though the key was configured...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact tool call, CLI command, or client action when possible.
      placeholder: |
        1. Configure key with `python server.py setup-key`
        2. Run the MCP server
        3. Call `list_elections`
        4. Observe...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - NEC API integration
        - Results matching
        - krpoltext booklet text/metadata
        - Public/private booklet boundary
        - MCP tools/resources
        - Docs / examples
        - CI / packaging
        - Other
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.11.9"
  - type: input
    id: platform
    attributes:
      label: OS / platform
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04..."
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or tracebacks
      description: Redact secrets before pasting.
      render: text
